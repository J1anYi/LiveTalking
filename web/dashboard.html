<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>livetalking数字人交互平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        :root {
            --bg: #F5F0EB;
            --card-bg: #FFFFFF;
            --primary: #8B8CF8;
            --primary-light: rgba(139, 140, 248, 0.12);
            --secondary: #6366F1;
            --bubble-user: #8B8CF8;
            --bubble-assistant: #F0EEF5;
            --bubble-system: transparent;
            --text-primary: #2D3436;
            --text-secondary: #636E72;
            --text-muted: #B2BEC3;
            --border: #E8E4E0;
            --border-light: #F0EDE8;
            --radius: 16px;
            --radius-sm: 10px;
            --shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
            --shadow-sm: 0 1px 4px rgba(0, 0, 0, 0.04);
            --transition: all 0.2s ease;
        }

        * { box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            margin: 0;
            min-height: 100vh;
        }

        /* Top Bar */
        .topbar {
            background: var(--card-bg);
            border-bottom: 1px solid var(--border-light);
            padding: 0 24px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .topbar-left { display: flex; align-items: center; gap: 16px; }
        .topbar-left .brand { font-weight: 700; font-size: 15px; color: var(--text-primary); letter-spacing: -0.3px; }
        .topbar-left .brand span { color: var(--primary); }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
        .status-dot.connected { background: #27AE60; }
        .status-dot.disconnected { background: #E74C3C; }
        .status-dot.connecting { background: #F39C12; animation: pulse 1s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
        .topbar-center { display: flex; align-items: center; gap: 8px; }
        .topbar-center .status-text { font-size: 13px; color: var(--text-secondary); }
        .topbar-right { display: flex; align-items: center; gap: 10px; }
        .topbar-right .btn-group-xs .btn { padding: 4px 12px; font-size: 12px; border-radius: 8px; }

        /* Main Layout */
        .main-wrapper {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px 24px;
            display: flex;
            gap: 20px;
            min-height: calc(100vh - 56px);
            align-items: flex-start;
        }

        .panel {
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .panel-video { flex: 0 0 calc(50% - 10px); }
        .panel-chat  { flex: 0 0 calc(50% - 10px); align-self: stretch; }

        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 20px;
            border-bottom: 1px solid var(--border-light);
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
        }
        .panel-header .badge-rag {
            display: inline-flex; align-items: center; gap: 6px;
            font-size: 12px; font-weight: 500; color: var(--primary);
            background: var(--primary-light); padding: 4px 10px; border-radius: 20px;
            cursor: pointer; transition: var(--transition);
        }
        .panel-header .badge-rag:hover { background: rgba(139,140,248,0.2); }

        /* Video */
        .video-wrap { padding: 16px; }
        .video-wrap video { width: 100%; border-radius: var(--radius-sm); display: block; background: #e8e4e0; }

        /* Chat Messages */
        .chat-msg-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px;
            min-height: 320px;
            max-height: 520px;
            scroll-behavior: smooth;
        }
        .chat-msg-container::-webkit-scrollbar { width: 4px; }
        .chat-msg-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        .chat-bubble { max-width: 82%; margin-bottom: 14px; clear: both; word-wrap: break-word; line-height: 1.5; }
        .chat-bubble.user { float: right; }
        .chat-bubble.user .bubble { background: var(--bubble-user); color: #fff; border-radius: 18px 18px 4px 18px; padding: 10px 16px; font-size: 14px; }
        .chat-bubble.assistant { float: left; }
        .chat-bubble.assistant .bubble { background: var(--bubble-assistant); color: var(--text-primary); border-radius: 18px 18px 18px 4px; padding: 10px 16px; font-size: 14px; }
        .chat-bubble.system { float: none; text-align: center; }
        .chat-bubble.system .bubble { background: transparent; color: var(--text-muted); font-size: 12px; padding: 4px 8px; }
        .chat-bubble.user .timestamp,
        .chat-bubble.assistant .timestamp { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
        .chat-bubble.user .timestamp { text-align: right; }
        .chat-bubble.assistant .timestamp { text-align: left; }
        .interrupted-badge { font-size: 11px; color: #E74C3C; margin-left: 6px; }

        .chat-typing { float: left; clear: both; padding: 10px 16px; background: var(--bubble-assistant); border-radius: 18px; margin-bottom: 14px; }
        .chat-typing .dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: var(--text-muted); margin: 0 2px; animation: typing 1.4s infinite; }
        .chat-typing .dot:nth-child(2) { animation-delay: 0.2s; }
        .chat-typing .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing { 0%,60%,100%{opacity:0.3} 30%{opacity:1} }

        /* Chat Input */
        .chat-input-area {
            border-top: 1px solid var(--border-light);
            padding: 12px 16px;
            background: var(--card-bg);
        }
        .chat-input-area .input-group { gap: 8px; }
        .chat-input-area textarea {
            border: 1px solid var(--border);
            border-radius: 12px !important;
            padding: 10px 14px;
            font-size: 14px;
            resize: none;
            background: var(--bg);
            transition: var(--transition);
        }
        .chat-input-area textarea:focus { outline: none; border-color: var(--primary); background: #fff; box-shadow: 0 0 0 3px var(--primary-light); }
        .chat-input-area .btn-send {
            background: var(--primary); color: #fff; border: none;
            border-radius: 12px !important;
            width: 44px; height: 44px;
            display: flex; align-items: center; justify-content: center;
            transition: var(--transition);
        }
        .chat-input-area .btn-send:hover:not(:disabled) { background: var(--secondary); transform: scale(1.05); }
        .chat-input-area .btn-send:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Sidebar */
        .chat-sidebar {
            width: 100%;
            border-bottom: 1px solid var(--border-light);
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            overflow-x: auto;
        }
        .chat-sidebar::-webkit-scrollbar { height: 2px; }
        .chat-sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
        .chat-sidebar .conv-item {
            flex-shrink: 0;
            padding: 4px 12px;
            cursor: pointer;
            border-radius: 20px;
            font-size: 12px;
            white-space: nowrap;
            background: var(--border-light);
            color: var(--text-secondary);
            transition: var(--transition);
        }
        .chat-sidebar .conv-item:hover { background: var(--primary-light); color: var(--primary); }
        .chat-sidebar .conv-item.active { background: var(--primary); color: #fff; }
        .chat-sidebar .conv-item .del { margin-left: 6px; cursor: pointer; opacity: 0.4; }
        .chat-sidebar .conv-item .del:hover { opacity: 1; }
        .chat-sidebar .btn-new {
            flex-shrink: 0;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            border: 1px dashed var(--border);
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition);
        }
        .chat-sidebar .btn-new:hover { border-color: var(--primary); color: var(--primary); }

        /* Video size slider */
        .video-controls { padding: 0 16px 16px; display: flex; align-items: center; gap: 10px; }
        .video-controls label { font-size: 12px; color: var(--text-secondary); white-space: nowrap; }
        .video-controls input[type="range"] {
            flex: 1; height: 4px; -webkit-appearance: none; appearance: none;
            background: var(--border); border-radius: 4px; outline: none;
        }
        .video-controls input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 14px; height: 14px;
            border-radius: 50%; background: var(--primary); cursor: pointer;
        }
        .video-controls .size-label { font-size: 12px; color: var(--text-muted); min-width: 32px; text-align: right; }

        /* Voice button */
        .voice-record-btn {
            width: 40px; height: 40px; border-radius: 50%;
            background: var(--border-light); color: var(--text-secondary);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: var(--transition); margin: 0 auto;
        }
        .voice-record-btn:hover { background: var(--primary-light); color: var(--primary); }
        .voice-record-label { text-align: center; font-size: 11px; color: var(--text-muted); margin-top: 4px; }

        /* Scroll button */
        .scroll-bottom-btn {
            position: sticky; bottom: 60px; float: right; z-index: 5;
            width: 32px; height: 32px; border-radius: 50%;
            background: var(--primary); color: #fff; border: none;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            font-size: 14px; margin-right: 20px; margin-top: -40px;
        }

        /* RAG dropdown in topbar */
        .rag-dropdown { position: relative; }
        .rag-dropdown-menu {
            position: absolute; top: 100%; right: 0; margin-top: 4px;
            background: var(--card-bg); border-radius: var(--radius-sm);
            box-shadow: 0 8px 24px rgba(0,0,0,0.12); border: 1px solid var(--border-light);
            padding: 6px; min-width: 180px; z-index: 200; display: none;
        }
        .rag-dropdown-menu.show { display: block; }
        .rag-dropdown-menu .rag-option {
            padding: 8px 12px; border-radius: 8px; cursor: pointer;
            font-size: 13px; color: var(--text-primary); transition: var(--transition);
        }
        .rag-dropdown-menu .rag-option:hover { background: var(--primary-light); }
        .rag-dropdown-menu .rag-option.active { background: var(--primary); color: #fff; }
        .rag-dropdown-menu .rag-option small { display: block; font-size: 11px; color: var(--text-muted); margin-top: 2px; }
        .rag-dropdown-menu .rag-option.active small { color: rgba(255,255,255,0.7); }

        @media (max-width: 820px) {
            .main-wrapper { flex-direction: column; padding: 12px; }
            .panel-video, .panel-chat { flex: none; width: 100%; }
            .panel-chat { min-height: 400px; }
            .chat-msg-container { min-height: 240px; max-height: 360px; }
            .topbar { padding: 0 12px; }
            .topbar-center .status-text { display: none; }
        }
    </style>
</head>

<body>
    <!-- Top Bar -->
    <div class="topbar">
        <div class="topbar-left">
            <div class="brand">livetalking<span>.</span></div>
            <span class="status-dot disconnected" id="connection-status-dot"></span>
            <span class="status-text" id="status-text">未连接</span>
        </div>
        <div class="topbar-center">
            <button id="start" class="btn btn-sm" style="background:var(--primary);color:#fff;border:none;border-radius:8px;padding:6px 16px;font-size:13px;">
                <i class="bi bi-play-fill"></i> 连接
            </button>
            <button id="stop" class="btn btn-sm" style="display:none;background:#E74C3C;color:#fff;border:none;border-radius:8px;padding:6px 16px;font-size:13px;">
                <i class="bi bi-stop-fill"></i> 断开
            </button>
        </div>
        <div class="topbar-right">
            <div class="rag-dropdown" id="rag-dropdown">
                <span class="badge-rag" id="rag-toggle-btn"><i class="bi bi-bookmark"></i> <span id="rag-label">仅知识库</span> <i class="bi bi-chevron-down" style="font-size:10px;"></i></span>
                <div class="rag-dropdown-menu" id="rag-menu">
                    <div class="rag-option active" data-mode="rag_only" onclick="setRagMode('rag_only')">
                        <div>仅知识库</div>
                        <small>只回答知识库内容</small>
                    </div>
                    <div class="rag-option" data-mode="rag_plus_model" onclick="setRagMode('rag_plus_model')">
                        <div>知识库+模型</div>
                        <small>结合知识库和模型自身知识</small>
                    </div>
                </div>
            </div>
            <div class="form-check form-switch mb-0" style="font-size:12px;">
                <input class="form-check-input" type="checkbox" id="use-stun" style="width:28px;height:16px;">
                <label class="form-check-label" for="use-stun" style="font-size:12px;color:var(--text-secondary);">STUN</label>
            </div>
        </div>
    </div>

    <!-- Main -->
    <div class="main-wrapper">
        <!-- Video Panel -->
        <div class="panel panel-video">
            <div class="panel-header">
                <span><i class="bi bi-camera-video"></i> 数字人</span>
                <span class="video-size-badge" style="font-size:12px;color:var(--text-muted);">100%</span>
            </div>
            <div class="video-wrap">
                <video id="video" autoplay playsinline></video>
            </div>
            <div class="video-controls">
                <label>大小</label>
                <input type="range" id="video-size-slider" min="50" max="100" value="100" step="5">
                <span class="size-label" id="video-size-value">100%</span>
            </div>
        </div>

        <!-- Chat Panel -->
        <div class="panel panel-chat">
            <div class="panel-header">
                <span><i class="bi bi-chat-dots"></i> 对话</span>
                <ul class="nav nav-tabs" id="interaction-tabs" role="tablist" style="border:none;gap:4px;">
                    <li class="nav-item" role="presentation">
                        <button class="nav-link active" id="chat-tab" data-bs-toggle="tab" data-bs-target="#chat" type="button" role="tab" style="border:none;padding:4px 10px;font-size:12px;border-radius:8px;background:var(--primary);color:#fff;">对话</button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" id="tts-tab" data-bs-toggle="tab" data-bs-target="#tts" type="button" role="tab" style="border:none;padding:4px 10px;font-size:12px;border-radius:8px;color:var(--text-secondary);">朗读</button>
                    </li>
                </ul>
            </div>
            <div class="tab-content" id="interaction-tabs-content" style="display:contents;">
                <!-- 对话模式 -->
                            <div class="tab-pane fade show active" id="chat" role="tabpanel" aria-labelledby="chat-tab"
                                 x-data="chatPanel()" x-cloak>
                                <style>
                                    [x-cloak] { display: none !important; }
                                    .chat-layout { display: flex; gap: 10px; }
                                    .chat-sidebar { width: 140px; flex-shrink: 0; }
                                    .chat-sidebar .conv-item { padding: 6px 8px; cursor: pointer; border-radius: 6px; font-size: 0.85em; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
                                    .chat-sidebar .conv-item:hover { background: #e9ecef; }
                                    .chat-sidebar .conv-item.active { background: #4361ee; color: #fff; }
                                    .chat-sidebar .conv-item .del { float: right; opacity: 0; cursor: pointer; }
                                    .chat-sidebar .conv-item:hover .del { opacity: 0.6; }
                                    .chat-main { flex: 1; min-width: 0; }
                                    .chat-msg-container { height: 280px; overflow-y: auto; padding: 10px; background: #f5f5f5; border-radius: 8px; margin-bottom: 10px; }
                                    .chat-bubble { max-width: 80%; margin-bottom: 10px; clear: both; word-wrap: break-word; }
                                    .chat-bubble.user { float: right; }
                                    .chat-bubble.user .bubble { background: #4361ee; color: #fff; border-radius: 18px 18px 4px 18px; padding: 8px 14px; }
                                    .chat-bubble.assistant { float: left; }
                                    .chat-bubble.assistant .bubble { background: #e9ecef; color: #212529; border-radius: 18px 18px 18px 4px; padding: 8px 14px; }
                                    .chat-bubble.system { float: none; text-align: center; }
                                    .chat-bubble.system .bubble { background: transparent; color: #6c757d; font-size: 0.85em; padding: 4px 8px; }
                                    .chat-bubble .timestamp { font-size: 0.7em; color: #999; margin-top: 2px; }
                                    .chat-bubble.user .timestamp { text-align: right; }
                                    .chat-bubble.assistant .timestamp { text-align: left; }
                                    .interrupted-badge { font-size: 0.75em; color: #dc3545; margin-left: 6px; }
                                    .chat-typing { float: left; clear: both; padding: 8px 14px; background: #e9ecef; border-radius: 18px; margin-bottom: 10px; }
                                    .chat-typing .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #999; margin: 0 2px; animation: typing 1.4s infinite; }
                                    .chat-typing .dot:nth-child(2) { animation-delay: 0.2s; }
                                    .chat-typing .dot:nth-child(3) { animation-delay: 0.4s; }
                                    @keyframes typing { 0%, 60%, 100% { opacity: 0.3; } 30% { opacity: 1; } }
                                    .chat-input-area { position: relative; }
                                    .scroll-bottom-btn { position: absolute; bottom: 100px; right: 20px; width: 36px; height: 36px; border-radius: 50%; background: #4361ee; color: #fff; border: none; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.2); z-index: 10; }
                                </style>

                                <div class="chat-layout">
                                    <!-- Sidebar -->
                                    <div class="chat-sidebar">
                                        <button class="btn btn-sm btn-outline-primary w-100 mb-2" @click="newConversation()">
                                            <i class="bi bi-plus-lg"></i> 新对话
                                        </button>
                                        <template x-for="conv in conversations" :key="conv.id">
                                            <div class="conv-item" :class="{ active: conv.id === activeConvId }"
                                                 @click="switchConversation(conv.id)"
                                                 @click.away="">
                                                <span x-text="conv.title"></span>
                                                <span class="del" @click.stop="deleteConversation(conv.id)">&times;</span>
                                            </div>
                                        </template>
                                    </div>
                                    <!-- Main -->
                                    <div class="chat-main">
                                        <div class="chat-msg-container" x-ref="msgContainer" @scroll="onScroll()">
                                            <template x-for="(msg, i) in messages" :key="i">
                                                <div :class="'chat-bubble ' + msg.role">
                                                    <div class="bubble" x-html="renderContent(msg.content)"></div>
                                                    <div class="timestamp">
                                                        <span x-text="msg.time"></span>
                                                        <span x-show="msg.interrupted" class="interrupted-badge">&#9888; 已中断</span>
                                                    </div>
                                                </div>
                                            </template>
                                            <div x-show="loading" class="chat-typing">
                                                <span class="dot"></span><span class="dot"></span><span class="dot"></span>
                                            </div>
                                        </div>

                                        <button class="scroll-bottom-btn" x-ref="scrollBtn" @click="scrollToBottom()" x-show="!atBottom">
                                            <i class="bi bi-arrow-down"></i>
                                        </button>

                                        <form @submit.prevent="sendMessage()" class="chat-input-area">
                                            <div class="input-group">
                                                <textarea class="form-control" x-model="inputText" rows="2" placeholder="输入您想对数字人说的话..." @keydown.enter.prevent="if(!$event.shiftKey)sendMessage()"></textarea>
                                                <button class="btn btn-primary" type="submit" :disabled="!inputText.trim() || sending">
                                                    <i class="bi bi-send"></i>
                                                </button>
                                            </div>
                                        </form>

                                <div class="voice-record-btn" id="voice-record-btn">
                                    <i class="bi bi-mic-fill"></i>
                                </div>
                                <div class="voice-record-label">按住说话，松开发送</div>
                            </div>

                            <!-- 朗读模式 -->
                            <div class="tab-pane fade" id="tts" role="tabpanel" aria-labelledby="tts-tab">
                                <div style="padding:16px;">
                                    <form id="echo-form">
                                        <div class="mb-3">
                                            <textarea class="form-control" id="message" rows="4" placeholder="输入您想让数字人朗读的文字..." style="border:1px solid var(--border);border-radius:12px;padding:10px 14px;font-size:14px;resize:none;"></textarea>
                                        </div>
                                        <button type="submit" class="btn w-100" style="background:var(--primary);color:#fff;border:none;border-radius:12px;padding:10px;">
                                            <i class="bi bi-volume-up"></i> 朗读文本
                                        </button>
                                    </form>
                                </div>
                            </div>
                                </div>

                                <script>
                                    function chatPanel() {
                                        return {
                                            messages: [],
                                            conversations: [],
                                            activeConvId: null,
                                            inputText: '',
                                            loading: false,
                                            sending: false,
                                            atBottom: true,
                                            sse: null,
                                            init() {
                                                this.addMessage('system', '欢迎使用livetalking，请点击"开始连接"按钮开始对话。');
                                            },
                                            addMessage(role, content, interrupted) {
                                                const now = new Date();
                                                const time = String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
                                                this.messages.push({ role, content, time, interrupted: !!interrupted });
                                                this.$nextTick(() => this.scrollToBottom());
                                            },
                                            renderContent(text) {
                                                if (!text) return '';
                                                try {
                                                    return DOMPurify.sanitize(marked.parse(text));
                                                } catch(e) {
                                                    return text;
                                                }
                                            },
                                            async loadConversations() {
                                                const sid = document.getElementById('sessionid').value;
                                                if (!sid || sid === '0') return;
                                                try {
                                                    const resp = await fetch('/conversations/list', {
                                                        method: 'POST',
                                                        headers: {'Content-Type': 'application/json'},
                                                        body: JSON.stringify({sessionid: sid})
                                                    });
                                                    const data = await resp.json();
                                                    if (data.code === 0) {
                                                        this.conversations = data.data.conversations;
                                                    }
                                                } catch(e) {}
                                            },
                                            async switchConversation(convId) {
                                                this.activeConvId = convId;
                                                this.messages = [];
                                                try {
                                                    const resp = await fetch('/conversations/get', {
                                                        method: 'POST',
                                                        headers: {'Content-Type': 'application/json'},
                                                        body: JSON.stringify({conv_id: convId})
                                                    });
                                                    const data = await resp.json();
                                                    if (data.code === 0 && data.data && data.data.messages) {
                                                        for (const m of data.data.messages) {
                                                            this.addMessage(m.role, m.content, m.is_interrupted);
                                                        }
                                                    }
                                                } catch(e) {}
                                            },
                                            async deleteConversation(convId) {
                                                try {
                                                    await fetch('/conversations/delete', {
                                                        method: 'POST',
                                                        headers: {'Content-Type': 'application/json'},
                                                        body: JSON.stringify({conv_id: convId})
                                                    });
                                                    if (this.activeConvId === convId) {
                                                        this.activeConvId = null;
                                                        this.messages = [];
                                                        this.addMessage('system', '对话已删除');
                                                    }
                                                    this.loadConversations();
                                                } catch(e) {}
                                            },
                                            async newConversation() {
                                                const sid = document.getElementById('sessionid').value;
                                                if (!sid || sid === '0') return;
                                                try {
                                                    const resp = await fetch('/conversations/create', {
                                                        method: 'POST',
                                                        headers: {'Content-Type': 'application/json'},
                                                        body: JSON.stringify({sessionid: sid})
                                                    });
                                                    const data = await resp.json();
                                                    if (data.code === 0) {
                                                        this.activeConvId = data.data.conv_id;
                                                        this.messages = [];
                                                        this.addMessage('system', '新对话已创建');
                                                        this.loadConversations();
                                                    }
                                                } catch(e) {}
                                            },
                                            connectSSE(sessionid) {
                                                if (this.sse) this.sse.close();
                                                this.sse = new EventSource('/sse/chat?sessionid=' + sessionid);
                                                let currentMsgId = null;
                                                this.sse.onmessage = (e) => {
                                                    try {
                                                        const data = JSON.parse(e.data);
                                                        if (data.type === 'chunk') {
                                                            if (!currentMsgId) {
                                                                currentMsgId = this.messages.length;
                                                                this.addMessage('assistant', '');
                                                            }
                                                            this.messages[currentMsgId].content += data.text;
                                                            this.$nextTick(() => this.scrollToBottom());
                                                        } else if (data.type === 'done') {
                                                            this.loading = false;
                                                            this.sending = false;
                                                            currentMsgId = null;
                                                            this.loadConversations();
                                                        } else if (data.type === 'error') {
                                                            this.addMessage('system', '回答出错: ' + (data.text || '未知错误'));
                                                            this.loading = false;
                                                            this.sending = false;
                                                            currentMsgId = null;
                                                        } else if (data.type === 'timeout') {
                                                            this.loading = false;
                                                            this.sending = false;
                                                            currentMsgId = null;
                                                        }
                                                    } catch(e) {}
                                                };
                                                this.sse.onerror = () => {};
                                            },
                                            disconnectSSE() {
                                                if (this.sse) { this.sse.close(); this.sse = null; }
                                            },
                                            sendMessage() {
                                                const text = this.inputText.trim();
                                                if (!text || this.sending) return;
                                                this.sending = true;
                                                this.addMessage('user', text);
                                                this.inputText = '';
                                                this.loading = true;
                                                const sessionid = document.getElementById('sessionid').value;
                                                if (sessionid && sessionid !== '0') {
                                                    this.connectSSE(sessionid);
                                                    if (!this.activeConvId) this.loadConversations();
                                                }
                                                fetch('/human', {
                                                    method: 'POST',
                                                    headers: {'Content-Type': 'application/json'},
                                                    body: JSON.stringify({ text, type: 'chat', interrupt: true, sessionid })
                                                }).catch(() => {
                                                    this.addMessage('system', '发送失败，请重试');
                                                }).finally(() => {
                                                    setTimeout(() => { this.sending = false; }, 500);
                                                });
                                            },
                                            onScroll() {
                                                const el = this.$refs.msgContainer;
                                                if (!el) return;
                                                this.atBottom = el.scrollHeight - el.scrollTop - el.clientHeight < 50;
                                            },
                                            scrollToBottom() {
                                                const el = this.$refs.msgContainer;
                                                if (el) el.scrollTop = el.scrollHeight;
                                                this.atBottom = true;
                                            }
                                        }
                                    }
                                </script>
                            </div>
                            
                            <!-- 朗读模式 -->
                            <div class="tab-pane fade" id="tts" role="tabpanel" aria-labelledby="tts-tab">
                                <form id="echo-form">
                                    <div class="mb-3">
                                        <label for="message" class="form-label">输入要朗读的文本</label>
                                        <textarea class="form-control" id="message" rows="6" placeholder="输入您想让数字人朗读的文字..."></textarea>
                                    </div>
                                    <button type="submit" class="btn btn-primary w-100">
                                        <i class="bi bi-volume-up"></i> 朗读文本
                                    </button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <!-- 隐藏的会话ID -->
    <input type="hidden" id="sessionid" value="0">


    <script src="client.js"></script>
    <script src="srs.sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked@15.0.7/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.4/dist/purify.min.js"></script>
    <script>
        $(document).ready(function() {
            $('#video-size-slider').on('input', function() {
                const value = $(this).val();
                $('#video-size-value').text(value + '%');
                $('#video').css('width', value + '%');
            });
            function updateConnectionStatus(status) {
                const statusDot = $('#connection-status-dot');
                const statusText = $('#status-text');
                
                statusDot.removeClass('connected disconnected connecting');
                
                switch(status) {
                    case 'connected':
                        statusDot.addClass('connected');
                        statusText.text('已连接');
                        break;
                    case 'connecting':
                        statusDot.addClass('connecting');
                        statusText.text('连接中...');
                        break;
                    case 'disconnected':
                    default:
                        statusDot.addClass('disconnected');
                        statusText.text('未连接');
                        break;
                }
            }



            // 开始/停止按钮
            $('#start').click(function() {
                updateConnectionStatus('connecting');
                start();
                $(this).hide();
                $('#stop').show();
                
                // 添加定时器检查视频流是否已加载
                let connectionCheckTimer = setInterval(function() {
                    const video = document.getElementById('video');
                    // 检查视频是否有数据
                    if (video.readyState >= 3 && video.videoWidth > 0) {
                        updateConnectionStatus('connected');
                        clearInterval(connectionCheckTimer);
                    }
                }, 2000); // 每2秒检查一次
                
                // 60秒后如果还是连接中状态，就停止检查
                setTimeout(function() {
                    if (connectionCheckTimer) {
                        clearInterval(connectionCheckTimer);
                    }
                }, 60000);
            });

            $('#stop').click(function() {
                stop();
                $(this).hide();
                $('#start').show();
                updateConnectionStatus('disconnected');
            });

            // 录制功能
            $('#btn_start_record').click(function() {
                console.log('Starting recording...');
                fetch('/record', {
                    body: JSON.stringify({
                        type: 'start_record',
                        sessionid: String(document.getElementById('sessionid').value),
                    }),
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    method: 'POST'
                }).then(function(response) {
                    if (response.ok) {
                        console.log('Recording started.');
                        $('#btn_start_record').prop('disabled', true);
                        $('#btn_stop_record').prop('disabled', false);
                        $('#recording-indicator').addClass('active');
                    } else {
                        console.error('Failed to start recording.');
                    }
                }).catch(function(error) {
                    console.error('Error:', error);
                });
            });

            $('#btn_stop_record').click(function() {
                console.log('Stopping recording...');
                fetch('/record', {
                    body: JSON.stringify({
                        type: 'end_record',
                        sessionid: String(document.getElementById('sessionid').value),
                    }),
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    method: 'POST'
                }).then(function(response) {
                    if (response.ok) {
                        console.log('Recording stopped.');
                        $('#btn_start_record').prop('disabled', false);
                        $('#btn_stop_record').prop('disabled', true);
                        $('#recording-indicator').removeClass('active');
                    } else {
                        console.error('Failed to stop recording.');
                    }
                }).catch(function(error) {
                    console.error('Error:', error);
                });
            });

            $('#echo-form').on('submit', function(e) {
                e.preventDefault();
                var message = $('#message').val();
                if (!message.trim()) return;
                
                console.log('Sending echo message:', message);
                
                fetch('/human', {
                    body: JSON.stringify({
                        text: message,
                        type: 'echo',
                        interrupt: true,
                        sessionid: String(document.getElementById('sessionid').value),
                    }),
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    method: 'POST'
                });
                
                $('#message').val('');
                addChatMessage(`已发送朗读请求: "${message}"`, 'system');
            });

            // RAG 模式切换（下拉菜单）
            window.setRagMode = function(mode) {
                $('.rag-option').removeClass('active');
                $(`.rag-option[data-mode="${mode}"]`).addClass('active');
                const labels = { rag_only: '仅知识库', rag_plus_model: '知识库+模型' };
                $('#rag-label').text(labels[mode] || mode);
                $('#rag-menu').removeClass('show');
                const sessionid = document.getElementById('sessionid').value;
                if (!sessionid) return;
                fetch('/set_rag_mode', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({sessionid: sessionid, mode: mode})
                }).then(r => r.json()).then(d => {
                    if (d.code === 0) localStorage.setItem('rag_mode', mode);
                });
            };
            $('#rag-toggle-btn').on('click', function(e) {
                e.stopPropagation();
                $('#rag-menu').toggleClass('show');
            });
            $(document).on('click', function(e) {
                if (!$(e.target).closest('.rag-dropdown').length) $('#rag-menu').removeClass('show');
            });

            // 页面加载时从服务端获取实际 RAG 模式
            const sessionid = document.getElementById('sessionid').value;
            if (sessionid) {
                fetch('/get_rag_mode', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({sessionid: sessionid})
                }).then(response => response.json())
                .then(data => {
                    if (data.code === 0 && data.data && data.data.mode) {
                        setRagMode(data.data.mode);
                        localStorage.setItem('rag_mode', data.data.mode);
                    }
                }).catch(() => {
                    const savedRagMode = localStorage.getItem('rag_mode') || 'rag_only';
                    setRagMode(savedRagMode);
                });
            }

            // WebRTC 连接后，通知 Alpine.js 建立 SSE
            var _origOnConnected = window.onWebRTCConnected || function(){};
            window.onWebRTCConnected = function() {
                var sid = document.getElementById('sessionid').value;
                if (sid && sid !== '0') {
                    var chatEl = document.querySelector('[x-data="chatPanel()"]');
                    if (chatEl && chatEl.__x) {
                        chatEl.__x.$data.connectSSE(sid);
                    }
                }
                _origOnConnected();
            };

            // 停止时断开 SSE
            var _origStop = window.stop || function(){};
            window.stop = function() {
                var chatEl = document.querySelector('[x-data="chatPanel()"]');
                if (chatEl && chatEl.__x) {
                    chatEl.__x.$data.disconnectSSE();
                }
                _origStop();
            };

            // 按住说话功能
            let mediaRecorder;
            let audioChunks = [];
            let isRecording = false;
            let recognition;
            
            // 检查浏览器是否支持语音识别
            const isSpeechRecognitionSupported = 'webkitSpeechRecognition' in window || 'SpeechRecognition' in window;
            
            if (isSpeechRecognitionSupported) {
                recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
                recognition.continuous = true;
                recognition.interimResults = true;
                recognition.lang = 'zh-CN';
                
                recognition.onresult = function(event) {
                    let interimTranscript = '';
                    let finalTranscript = '';
                    
                    for (let i = event.resultIndex; i < event.results.length; ++i) {
                        if (event.results[i].isFinal) {
                            finalTranscript += event.results[i][0].transcript;
                        } else {
                            interimTranscript += event.results[i][0].transcript;
                            $('#chat-message').val(interimTranscript);
                        }
                    }
                    
                    if (finalTranscript) {
                        $('#chat-message').val(finalTranscript);
                    }
                };
                
                recognition.onerror = function(event) {
                    console.error('语音识别错误:', event.error);
                };
            }
            
            // 按住说话按钮事件
            $('#voice-record-btn').on('mousedown touchstart', function(e) {
                e.preventDefault();
                startRecording();
            }).on('mouseup mouseleave touchend', function() {
                if (isRecording) {
                    stopRecording();
                }
            });
            
            // 开始录音
            function startRecording() {
                if (isRecording) return;
                
                navigator.mediaDevices.getUserMedia({ audio: true })
                    .then(function(stream) {
                        audioChunks = [];
                        mediaRecorder = new MediaRecorder(stream);
                        
                        mediaRecorder.ondataavailable = function(e) {
                            if (e.data.size > 0) {
                                audioChunks.push(e.data);
                            }
                        };
                        
                        mediaRecorder.start();
                        isRecording = true;
                        
                        $('#voice-record-btn').addClass('recording-pulse');
                        $('#voice-record-btn').css('background-color', '#dc3545');
                        
                        if (recognition) {
                            recognition.start();
                        }
                    })
                    .catch(function(error) {
                        console.error('无法访问麦克风:', error);
                        alert('无法访问麦克风，请检查浏览器权限设置。');
                    });
            }

            function stopRecording() {
                if (!isRecording) return;
                
                mediaRecorder.stop();
                isRecording = false;
                
                // 停止所有音轨
                mediaRecorder.stream.getTracks().forEach(track => track.stop());
                
                // 视觉反馈恢复
                $('#voice-record-btn').removeClass('recording-pulse');
                $('#voice-record-btn').css('background-color', '');
                
                // 停止语音识别
                if (recognition) {
                    recognition.stop();
                }
                
                // 获取识别的文本并发送
                setTimeout(function() {
                    const recognizedText = $('#chat-message').val().trim();
                    if (recognizedText) {
                        // 发送识别的文本
                        fetch('/human', {
                            body: JSON.stringify({
                                text: recognizedText,
                                type: 'chat',
                                interrupt: true,
                                sessionid: String(document.getElementById('sessionid').value),
                            }),
                            headers: {
                                'Content-Type': 'application/json'
                            },
                            method: 'POST'
                        });
                        
                        addChatMessage(recognizedText, 'user');
                        $('#chat-message').val('');
                    }
                }, 500); 
            }

            // WebRTC 相关功能
            if (typeof window.onWebRTCConnected === 'function') {
                const originalOnConnected = window.onWebRTCConnected;
                window.onWebRTCConnected = function() {
                    updateConnectionStatus('connected');
                    const sessionid = document.getElementById('sessionid').value;
                    const savedRagMode = localStorage.getItem('rag_mode') || 'rag_only';
                    if (sessionid) fetch('/set_rag_mode', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({sessionid,mode:savedRagMode})});
                    if (originalOnConnected) originalOnConnected();
                };
            } else {
                window.onWebRTCConnected = function() {
                    updateConnectionStatus('connected');
                    const sessionid = document.getElementById('sessionid').value;
                    const savedRagMode = localStorage.getItem('rag_mode') || 'rag_only';
                    if (sessionid) fetch('/set_rag_mode', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({sessionid,mode:savedRagMode})});
                };
            }

            // 当连接断开时更新状态
            if (typeof window.onWebRTCDisconnected === 'function') {
                const originalOnDisconnected = window.onWebRTCDisconnected;
                window.onWebRTCDisconnected = function() {
                    updateConnectionStatus('disconnected');
                    if (originalOnDisconnected) originalOnDisconnected();
                };
            } else {
                window.onWebRTCDisconnected = function() {
                    updateConnectionStatus('disconnected');
                };
            }

            // SRS WebRTC播放功能
            var sdk = null; // 全局处理器，用于在重新发布时进行清理

            function startPlay() {
                // 关闭之前的连接
                if (sdk) {
                    sdk.close();
                }
                
                sdk = new SrsRtcWhipWhepAsync();
                $('#video').prop('srcObject', sdk.stream);
                
                var host = window.location.hostname;
                var url = "http://" + host + ":1985/rtc/v1/whep/?app=live&stream=livestream";
                
                sdk.play(url).then(function(session) {
                    console.log('WebRTC播放已启动，会话ID:', session.sessionid);
                }).catch(function(reason) {
                    sdk.close();
                    console.error('WebRTC播放失败:', reason);
                });
            }
        });
    </script>
</body>
</html>
